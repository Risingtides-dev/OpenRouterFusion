<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owl Alpha · OpenRouter Chat</title>

  <!-- CDN-hosted libraries -->
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #070b16;
      --panel: rgba(15, 23, 42, 0.78);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #8b5cf6;
      --ok: #22c55e;
      --danger: #fb7185;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.22), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 28rem),
        linear-gradient(135deg, #050816, #0f172a 55%, #111827);
      color: var(--text);
    }

    button, input, textarea { font: inherit; }

    .app {
      width: min(1100px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 48px; height: 48px;
      border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.95), rgba(59, 130, 246, 0.95));
      box-shadow: 0 12px 30px rgba(139, 92, 246, 0.28);
      font-size: 24px;
    }

    h1 { margin: 0; font-size: clamp(1.4rem, 3vw, 1.9rem); letter-spacing: -0.03em; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 0.92rem; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .status {
      display: inline-flex; align-items: center; gap: 8px;
      min-height: 36px; padding: 8px 12px;
      border: 1px solid var(--border); border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      color: var(--muted); font-size: 0.9rem; max-width: 520px;
    }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
    .status.streaming .status-dot { background: var(--ok); animation: pulse 1.1s infinite; }
    .status.error .status-dot { background: var(--danger); }
    .status.error { color: var(--danger); }
    @keyframes pulse {
      0%, 100% { opacity: 0.45; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .settings {
      display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px;
      padding: 16px; border: 1px solid var(--border); border-radius: 22px;
      background: var(--panel); box-shadow: var(--shadow); backdrop-filter: blur(18px);
    }
    .field { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    label { color: #cbd5e1; font-weight: 700; font-size: 0.9rem; }
    .hint { margin: 0; color: var(--muted); font-size: 0.8rem; line-height: 1.4; }
    .inline-row { display: flex; gap: 8px; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border); border-radius: 14px;
      background: rgba(2, 6, 23, 0.72); color: var(--text);
      outline: none; padding: 12px 13px;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    input:focus, textarea:focus {
      border-color: rgba(139, 92, 246, 0.75);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.16);
      background: rgba(2, 6, 23, 0.9);
    }
    textarea { resize: vertical; min-height: 84px; line-height: 1.45; }
    #userInput { min-height: 58px; }

    button {
      border: 1px solid var(--border); border-radius: 14px;
      padding: 10px 14px; color: var(--text);
      background: rgba(30, 41, 59, 0.78); cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); border-color: rgba(139, 92, 246, 0.55); background: rgba(51, 65, 85, 0.9); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .primary { background: linear-gradient(135deg, #7c3aed, #2563eb); border-color: rgba(167, 139, 250, 0.5); color: #fff; }
    .ghost { background: rgba(15, 23, 42, 0.55); }
    .small { padding: 8px 11px; font-size: 0.88rem; }

    .chat-log {
      flex: 1; min-height: 360px; max-height: calc(100vh - 360px);
      overflow-y: auto; padding: 18px;
      border: 1px solid var(--border); border-radius: 24px;
      background: rgba(2, 6, 23, 0.42);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), var(--shadow);
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-color: rgba(148, 163, 184, 0.45) transparent;
    }

    .empty {
      align-self: center; max-width: 560px; margin: auto;
      padding: 28px; text-align: center;
      border: 1px dashed var(--border); border-radius: 22px;
      background: rgba(15, 23, 42, 0.45); color: var(--muted);
    }
    .empty strong { display: block; color: var(--text); font-size: 1.1rem; margin-bottom: 8px; }

    .message { display: flex; align-items: flex-start; gap: 10px; max-width: 88%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: grid; place-items: center; flex: 0 0 auto;
      font-size: 0.68rem; font-weight: 900; color: #fff; user-select: none;
    }
    .message.user .avatar { background: linear-gradient(135deg, #38bdf8, #2563eb); }
    .message.assistant .avatar { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

    .bubble {
      border: 1px solid var(--border); border-radius: 18px;
      padding: 12px 14px; background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22); overflow-wrap: anywhere;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(29, 78, 216, 0.95));
      border-color: rgba(255, 255, 255, 0.12); color: #fff;
    }
    .meta { color: var(--muted); font-size: 0.74rem; margin-bottom: 8px; }
    .message.user .meta { color: rgba(255, 255, 255, 0.72); }

    .markdown-body { font-size: 0.98rem; line-height: 1.58; }
    .markdown-body p { margin: 0 0 10px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { line-height: 1.25; margin: 14px 0 8px; }
    .markdown-body h1:first-child, .markdown-body h2:first-child, .markdown-body h3:first-child { margin-top: 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.4rem; }
    .markdown-body blockquote {
      margin: 10px 0; padding: 0.2rem 0.8rem;
      border-left: 3px solid rgba(139, 92, 246, 0.8);
      color: #cbd5e1; background: rgba(139, 92, 246, 0.08); border-radius: 0 10px 10px 0;
    }
    .markdown-body pre { overflow: auto; padding: 12px; border-radius: 14px; background: #020617; border: 1px solid rgba(148, 163, 184, 0.18); }
    .markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }
    .markdown-body :not(pre) > code { padding: 2px 5px; border-radius: 6px; background: rgba(148, 163, 184, 0.16); }
    .markdown-body table { border-collapse: collapse; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 6px 10px; }
    .typing { color: var(--muted); font-style: italic; }

    .composer {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px;
      padding: 12px; border: 1px solid var(--border); border-radius: 24px;
      background: var(--panel); box-shadow: var(--shadow); backdrop-filter: blur(18px);
    }
    .form-actions { display: flex; gap: 8px; align-items: end; }
    .footer { color: var(--muted); font-size: 0.78rem; text-align: center; }
    .footer code { color: #c4b5fd; }

    @media (max-width: 780px) {
      .app { width: calc(100% - 20px); padding: 14px 0; }
      .header { align-items: flex-start; flex-direction: column; }
      .settings { grid-template-columns: 1fr; }
      .inline-row { flex-wrap: wrap; }
      .chat-log { max-height: none; min-height: 320px; }
      .message { max-width: 96%; }
      .composer { grid-template-columns: 1fr; }
      .form-actions button { flex: 1; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true"><span style=\"font-size:24px; font-weight:900; color:#fff;\">O</span></div>
        <div>
          <h1>Owl Alpha</h1>
          <p class="subtitle">Streaming chat · client-side only · model: <code>openrouter/owl-alpha</code></p>
        </div>
      </div>
      <div class="header-actions">
        <button id="clearChatBtn" class="ghost small" type="button">Clear chat</button>
      </div>
      <div id="status" class="status idle" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">Loading…</span>
      </div>
    </header>

    <section class="settings" aria-label="Settings">
      <div class="field">
        <label for="apiKey">OpenRouter API key</label>
        <div class="inline-row">
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="sk-or-..." />
          <button id="saveKeyBtn" class="ghost" type="button">Save</button>
          <button id="clearKeyBtn" class="ghost" type="button">Clear</button>
        </div>
        <p class="hint">Kept in <code>sessionStorage</code> for this tab only — never sent anywhere except OpenRouter.</p>
      </div>
      <div class="field">
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt" placeholder="You are a helpful, concise assistant..."></textarea>
      </div>
    </section>

    <main id="chatLog" class="chat-log" aria-label="Chat messages" aria-live="polite"></main>

    <form id="chatForm" class="composer" autocomplete="off">
      <textarea id="userInput" placeholder="Message Owl Alpha… (Shift+Enter for newline)" aria-label="Message"></textarea>
      <div class="form-actions">
        <button id="sendBtn" class="primary" type="submit" disabled>Send</button>
        <button id="stopBtn" class="ghost" type="button" disabled>Stop</button>
      </div>
    </form>

    <div class="footer">Endpoint: <code>https://openrouter.ai/api/v1/chat/completions</code></div>
  </div>

  <script>
    (() => {
      "use strict";

      const MODEL = "openrouter/owl-alpha";
      const API_URL = "https://openrouter.ai/api/v1/chat/completions";
      const APP_TITLE = "Owl Alpha Single File UI";
      const APP_REFERER = (() => {
        try {
          return location.origin && location.origin !== "null" ? location.href : "http://localhost";
        } catch { return "http://localhost"; }
      })();

      const KEYS = {
        apiKey: "openrouter.owl-alpha.apiKey",
        messages: "openrouter.owl-alpha.messages",
        systemPrompt: "openrouter.owl-alpha.systemPrompt"
      };

      const els = {
        apiKey: document.getElementById("apiKey"),
        saveKeyBtn: document.getElementById("saveKeyBtn"),
        clearKeyBtn: document.getElementById("clearKeyBtn"),
        systemPrompt: document.getElementById("systemPrompt"),
        chatLog: document.getElementById("chatLog"),
        chatForm: document.getElementById("chatForm"),
        userInput: document.getElementById("userInput"),
        sendBtn: document.getElementById("sendBtn"),
        stopBtn: document.getElementById("stopBtn"),
        clearChatBtn: document.getElementById("clearChatBtn"),
        status: document.getElementById("status"),
        statusText: document.getElementById("statusText")
      };

      if (!window.showdown) {
        els.chatLog.innerHTML = `<div class="empty"><strong>Showdown failed to load.</strong><span>Check your network/CDN connection and reload.</span></div>`;
        return;
      }

      const converter = new showdown.Converter({
        simplifiedAutoLink: true,
        literalMidWordUnderscores: true,
        simpleLineBreaks: true,
        tables: true,
        tasklists: true,
        strikethrough: true,
        ghCodeBlocks: true,
        openLinksInNewWindow: true,
        noHeaderId: true
      });
      converter.setFlavor("github");

      let messages = [];
      let isStreaming = false;
      let controller = null;
      let currentBubble = null;
      let assistantIndex = -1;
      let sseBuffer = "";
      let dataBuffer = "";
      let done = false;
      let streamErrored = false;
      let saveTimer = null;

      /* ---------- storage helpers ---------- */
      const get = (k) => { try { return sessionStorage.getItem(k); } catch { return null; } };
      const set = (k, v) => { try { sessionStorage.setItem(k, v); return true; } catch { return false; } };
      const remove = (k) => { try { sessionStorage.removeItem(k); return true; } catch { return false; } };

      function loadState() {
        try {
          const raw = get(KEYS.messages);
          messages = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(messages)) messages = [];
        } catch { messages = []; }
        els.apiKey.value = get(KEYS.apiKey) || "";
        els.systemPrompt.value = get(KEYS.systemPrompt) || "";
      }
      const saveMessages = () => set(KEYS.messages, JSON.stringify(messages));
      const savePrompt = () => set(KEYS.systemPrompt, els.systemPrompt.value);
      const saveApiKey = () => {
        const k = els.apiKey.value.trim();
        return k ? set(KEYS.apiKey, k) : remove(KEYS.apiKey);
      };
      function scheduleSave() {
        if (saveTimer) return;
        saveTimer = setTimeout(() => { saveTimer = null; saveMessages(); }, 250);
      }

      /* ---------- UI helpers ---------- */
      function setStatus(text, mode = "idle") {
        els.status.className = `status ${mode}`;
        els.statusText.textContent = text;
      }
      function renderMarkdown(md) {
        const html = converter.makeHtml(md);
        return window.DOMPurify ? DOMPurify.sanitize(html, { USE_PROFILES: { html: true } }) : html;
      }
      const scrollToBottom = () => { els.chatLog.scrollTop = els.chatLog.scrollHeight; };

      function appendMessage(role, content = "", scroll = true) {
        const row = document.createElement("article");
        row.className = `message ${role}`;
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "You" : "Owl";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = role === "user" ? "You" : "Owl Alpha";
        const body = document.createElement("div");
        body.className = "markdown-body";
        body.innerHTML = content ? renderMarkdown(content) : `<span class="typing">Thinking…</span>`;
        bubble.append(meta, body);
        row.append(avatar, bubble);
        els.chatLog.append(row);
        if (scroll) scrollToBottom();
        return bubble;
      }

      function render() {
        els.chatLog.replaceChildren();
        if (!messages.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.innerHTML = `<strong>Ready.</strong><span>Enter your OpenRouter API key, optionally set a system prompt, then ask a question.</span>`;
          els.chatLog.append(empty);
          return;
        }
        messages.forEach((m) => appendMessage(m.role, m.content || "", false));
        scrollToBottom();
      }

      function updateAssistant(content) {
        if (!currentBubble) return;
        const body = currentBubble.querySelector(".markdown-body");
        body.innerHTML = content ? renderMarkdown(content) : `<span class="typing">Thinking…</span>`;
        scrollToBottom();
      }

      function appendErrorToAssistant(text) {
        const m = messages[assistantIndex];
        if (!m) return;
        if (m.content && !m.content.endsWith("\n\n")) m.content += "\n\n";
        m.content += "> ⚠️ " + String(text).replace(/\r?\n/g, "\n> ");
        updateAssistant(m.content);
      }

      function setBusy(busy) {
        isStreaming = busy;
        els.userInput.disabled = busy;
        els.apiKey.disabled = busy;
        els.systemPrompt.disabled = busy;
        els.saveKeyBtn.disabled = busy;
        els.clearKeyBtn.disabled = busy;
        els.clearChatBtn.disabled = busy;
        els.sendBtn.disabled = busy || !els.userInput.value.trim();
        els.stopBtn.disabled = !busy;
      }
      function updateSendButton() {
        if (!isStreaming) els.sendBtn.disabled = !els.userInput.value.trim();
      }

      function buildRequestMessages() {
        const system = els.systemPrompt.value.trim();
        const base = system ? [{ role: "system", content: system }] : [];
        const history = messages.filter(
          (m) => !(m.role === "assistant" && !String(m.content || "").trim())
        );
        return [...base, ...history];
      }

      function parseError(text, status) {
        let detail = text || `HTTP ${status}`;
        try {
          const j = JSON.parse(text);
          detail = j?.error?.message || j?.message || JSON.stringify(j);
        } catch {}
        if (status === 401) return `Authentication failed (401): ${detail}`;
        if (status === 402) return `Insufficient credits (402): ${detail}`;
        if (status === 429) return `Rate limited (429): ${detail}`;
        return `Request failed (${status}): ${detail}`;
      }

      /* ---------- SSE parsing ---------- */
      function processSse(text) {
        sseBuffer += text;
        const lines = sseBuffer.split(/\r\n|\r|\n/);
        sseBuffer = lines.pop() || "";
        for (const line of lines) handleLine(line);
      }

      function handleLine(line) {
        if (line === "") { dispatch(); return; }     // blank line = end of event
        if (line.startsWith(":")) return;             // SSE comment / keep-alive (e.g. ": OPENROUTER PROCESSING")
        const idx = line.indexOf(":");
        let field, value;
        if (idx === -1) { field = line; value = ""; }
        else { field = line.slice(0, idx); value = line.slice(idx + 1); if (value.startsWith(" ")) value = value.slice(1); }
        if (field === "data") dataBuffer += value + "\n";
        // (event/id/retry fields ignored for this endpoint)
      }

      function dispatch() {
        let data = dataBuffer.endsWith("\n") ? dataBuffer.slice(0, -1) : dataBuffer;
        dataBuffer = "";
        const normalized = data.trim();
        if (!normalized) return;
        if (normalized === "[DONE]") { done = true; return; }

        let chunk;
        try { chunk = JSON.parse(normalized); } catch { return; }

        // Mid-stream errors can arrive over a 200 OK stream
        if (chunk.error) {
          const msg = chunk.error.message || "Unknown streaming error";
          appendErrorToAssistant(msg);
          setStatus(msg, "error");
          streamErrored = true; done = true;
          return;
        }

        const choice = chunk.choices?.[0];
        const content = typeof choice?.delta?.content === "string" ? choice.delta.content : "";
        if (content) {
          if (!messages[assistantIndex]) messages[assistantIndex] = { role: "assistant", content: "" };
          messages[assistantIndex].content += content;
          updateAssistant(messages[assistantIndex].content);
          scheduleSave();
        }
        if (choice?.finish_reason === "error") {
          const msg = chunk.error?.message || "Stream terminated with finish_reason: error";
          appendErrorToAssistant(msg);
          setStatus(msg, "error");
          streamErrored = true; done = true;
        }
      }

      function flushPending() {
        if (sseBuffer.trim()) { handleLine(sseBuffer); dispatch(); }
        sseBuffer = "";
      }

      /* ---------- submit / stream ---------- */
      async function handleSubmit(e) {
        e.preventDefault();
        if (isStreaming) return;

        const key = els.apiKey.value.trim();
        if (!key) { setStatus("Enter your OpenRouter API key to start.", "error"); els.apiKey.focus(); return; }

        const text = els.userInput.value.trim();
        if (!text) return;

        saveApiKey();
        savePrompt();

        messages.push({ role: "user", content: text });
        assistantIndex = messages.push({ role: "assistant", content: "" }) - 1;
        saveMessages();
        render();

        const bubbles = els.chatLog.querySelectorAll(".message.assistant .bubble");
        currentBubble = bubbles[bubbles.length - 1];

        els.userInput.value = "";
        updateSendButton();
        setBusy(true);
        setStatus("Streaming from openrouter/owl-alpha…", "streaming");

        sseBuffer = ""; dataBuffer = ""; done = false; streamErrored = false;
        controller = new AbortController();

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${key}`,
              "Content-Type": "application/json",
              "HTTP-Referer": APP_REFERER,
              "X-Title": APP_TITLE
            },
            body: JSON.stringify({
              model: MODEL,
              messages: buildRequestMessages(),
              stream: true,
              temperature: 0.7
            }),
            signal: controller.signal
          });

          if (!res.ok) {
            const errText = await res.text();
            throw new Error(parseError(errText, res.status));
          }
          if (!res.body || typeof res.body.getReader !== "function") {
            throw new Error("This browser does not support streaming response bodies.");
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder("utf-8");

          while (true) {
            const { value, done: streamDone } = await reader.read();
            if (streamDone) break;
            processSse(decoder.decode(value, { stream: true }));
            if (done || streamErrored) break;
          }
          const tail = decoder.decode();
          if (tail) processSse(tail);
          flushPending();

          if (!messages[assistantIndex]?.content.trim()) {
            messages[assistantIndex].content = "_No content was returned._";
            updateAssistant(messages[assistantIndex].content);
          }
          saveMessages();
          if (!streamErrored) setStatus("Done.", "idle");
        } catch (err) {
          if (err.name === "AbortError") {
            appendErrorToAssistant("Stream stopped by user.");
            setStatus("Stopped.", "idle");
          } else {
            const msg = err.message || String(err);
            appendErrorToAssistant(msg);
            setStatus(msg, "error");
          }
          saveMessages();
        } finally {
          currentBubble = null;
          setBusy(false);
          updateSendButton();
          controller = null;
        }
      }

      function clearChat() {
        if (isStreaming) { setStatus("Stop the current stream before clearing.", "error"); return; }
        messages = []; assistantIndex = -1; currentBubble = null;
        saveMessages(); render();
        setStatus("Chat cleared.", "idle");
      }

      /* ---------- events ---------- */
      els.chatForm.addEventListener("submit", handleSubmit);
      els.userInput.addEventListener("input", updateSendButton);
      els.userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); els.chatForm.requestSubmit(); }
      });
      els.stopBtn.addEventListener("click", () => controller && controller.abort());
      els.clearChatBtn.addEventListener("click", clearChat);
      els.saveKeyBtn.addEventListener("click", () => {
        const ok = saveApiKey();
        setStatus(ok ? "API key saved for this tab." : "Could not save key (storage unavailable).", ok ? "idle" : "error");
      });
      els.clearKeyBtn.addEventListener("click", () => {
        els.apiKey.value = ""; remove(KEYS.apiKey);
        setStatus("API key cleared.", "idle"); els.apiKey.focus();
      });
      els.systemPrompt.addEventListener("input", savePrompt);

      /* ---------- init ---------- */
      loadState();
      render();
      updateSendButton();
      if (messages.length && !els.apiKey.value.trim()) setStatus("Chat restored. Enter an API key to continue.", "idle");
      else if (messages.length) setStatus("Chat restored.", "idle");
      else setStatus("Ready. Enter your OpenRouter API key.", "idle");
    })();
  </script>
</body>
</html>
